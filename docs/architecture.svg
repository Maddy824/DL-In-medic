<svg width="100%" viewBox="0 0 680 462" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Frontend container -->
  <rect x="30" y="26" width="620" height="108" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Frontend (React + Vite)</text>

  <!-- Camera Component -->
  <rect x="50" y="62" width="172" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="136" y="85" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Camera component</text>
  <text x="136" y="104" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Captures dermoscopy images</text>

  <!-- 3D Viewer -->
  <rect x="254" y="62" width="172" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="85" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">3D viewer (Three.js)</text>
  <text x="340" y="104" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Renders 3D lesion models</text>

  <!-- Augmentation Viewer -->
  <rect x="458" y="62" width="172" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="544" y="85" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Augmentation viewer</text>
  <text x="544" y="104" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Shows augmented outputs</text>

  <!-- REST API connector -->
  <line x1="340" y1="136" x2="340" y2="168" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <rect x="302" y="144" width="76" height="18" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="153" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">REST API</text>

  <!-- Backend container -->
  <rect x="30" y="172" width="620" height="262" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Backend (FastAPI + PyTorch)</text>

  <!-- DermClassifier Model box -->
  <rect x="48" y="210" width="278" height="206" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="187" y="233" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">DermClassifier model</text>
  <line x1="60" y1="244" x2="314" y2="244" stroke="#0F6E56" stroke-width="0.5" opacity="0.3"/>
  <text x="64" y="263" dominant-baseline="central" font-size="12" fill="#0F6E56">• MobileNetV2 backbone (ImageNet)</text>
  <text x="64" y="285" dominant-baseline="central" font-size="12" fill="#0F6E56">• Channel attention (SE-style)</text>
  <text x="64" y="307" dominant-baseline="central" font-size="12" fill="#0F6E56">• FC: 1280 → 512 → 256 → 7 classes</text>
  <text x="64" y="329" dominant-baseline="central" font-size="12" fill="#0F6E56">• Confidence head: FC → 128 → 1</text>
  <text x="64" y="351" dominant-baseline="central" font-size="12" fill="#0F6E56">• Softmax + sigmoid outputs</text>
  <text x="64" y="373" dominant-baseline="central" font-size="12" fill="#0F6E56">• 7-class skin condition labels</text>

  <!-- 3D Augmentation Pipeline box -->
  <rect x="344" y="210" width="278" height="206" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="483" y="233" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">3D augmentation pipeline</text>
  <line x1="356" y1="244" x2="610" y2="244" stroke="#993C1D" stroke-width="0.5" opacity="0.3"/>
  <text x="360" y="263" dominant-baseline="central" font-size="12" fill="#993C1D">1. Surface normal estimation (Sobel)</text>
  <text x="360" y="285" dominant-baseline="central" font-size="12" fill="#993C1D">2. Perspective warp (3D rotation)</text>
  <text x="360" y="307" dominant-baseline="central" font-size="12" fill="#993C1D">3. Lambertian lighting (dot-product)</text>
  <text x="360" y="329" dominant-baseline="central" font-size="12" fill="#993C1D">4. Elastic deformation (Gaussian)</text>
  <text x="360" y="351" dominant-baseline="central" font-size="12" fill="#993C1D">5. Color augmentation (HSV shifts)</text>
  <text x="360" y="373" dominant-baseline="central" font-size="12" fill="#993C1D">6. Output → augmented tensor</text>
</svg>
